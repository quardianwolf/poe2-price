appId: "com.quardianwolf.poe2price"
publish:
  provider: "github"
  owner: "quardianwolf"
  repo: "poe2-price"
productName: "PoE2 Price"
npmRebuild: false
files:
  - "package.json"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js"]
  - from: "../renderer/dist"
    to: "."
extraMetadata:
  main: "main.js"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  icon: "../renderer/public/icon.ico"
  target:
    - "nsis"
    - "portable"
linux:
  target:
    - "AppImage"
mac:
  target:
    - target: "dmg"
      arch:
        - "universal"
  identity: null
  x64ArchFiles: "*"
appImage:
  executableArgs:
    - "--sandbox"
